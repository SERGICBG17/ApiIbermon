services:
  mongodb:
    image: mongo:4.4
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: ibermon_db
    volumes:
      - mongodb_data:/data/db
    networks:
      - ibermon_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-25013}:8000"
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD:-admin123}@mongodb:27017/ibermon_db?authSource=admin
      MONGO_DB_NAME: ibermon_db
      SECRET_KEY: ${SECRET_KEY:-ibermon_tfg_dev_secret}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      APP_NAME: Apilbermon
      DEBUG: ${DEBUG:-False}
    depends_on:
      - mongodb
    networks:
      - ibermon_network

volumes:
  mongodb_data:
    driver: local

networks:
  ibermon_network:
    driver: bridge