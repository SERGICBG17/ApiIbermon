services:

  mongodb:
    image: mongo:7.0
    container_name: ibermon_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: ibermon_db
    volumes:
      - mongodb_data:/data/db
    networks:
      - ibermon_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5


  restore:
    image: mongo:7.0
    container_name: ibermon_restore
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD:-admin123}@mongodb:27017/?authSource=admin
      MONGO_DB_NAME: ibermon_db
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./data/dump:/dump:ro
      - ./scripts:/scripts:ro
    networks:
      - ibermon_network
    entrypoint: ["bash", "/scripts/restore.sh"]
    restart: "no"


  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ibermon_api
    restart: unless-stopped
    ports:
      - "${API_PORT:-25013}:8000"
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD:-admin123}@mongodb:27017/ibermon_db?authSource=admin
      MONGO_DB_NAME: ibermon_db
      SECRET_KEY: ${SECRET_KEY:-dev_secret_key_de_prueba}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      APP_NAME: Apilbermon
      DEBUG: ${DEBUG:-False}
    depends_on:
      mongodb:
        condition: service_healthy
      # Mientras no tengamos dump commiteado, dependemos de reseed (PokeAPI).
      # Cuando exista data/dump/ commiteado, cambiar esto a 'restore' y
      # devolver 'reseed' al perfil opcional.
      reseed:
        condition: service_completed_successfully
    networks:
      - ibermon_network


  reseed:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ibermon_reseed
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD:-admin123}@mongodb:27017/ibermon_db?authSource=admin
      MONGO_DB_NAME: ibermon_db
      SECRET_KEY: ${SECRET_KEY:-dev_secret_key_de_prueba}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      APP_NAME: Apilbermon
      DEBUG: ${DEBUG:-False}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ibermon_network
    command: python -m app.utils.seed
    restart: "no"

volumes:
  mongodb_data:
    driver: local

networks:
  ibermon_network:
    driver: bridge