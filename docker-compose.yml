services:
  mongodb:
    image: mongo:6.0
    container_name: ibermon_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: ibermon_db
    volumes:
      - mongodb_data:/data/db
    networks:
      - ibermon_network
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --host localhost -u \"$${MONGO_INITDB_ROOT_USERNAME}\" -p \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.adminCommand({ ping: 1 })\""]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ibermon_api
    restart: unless-stopped
    ports:
      - "${API_PORT:-25013}:8000"
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD:-admin123}@mongodb:27017/ibermon_db?authSource=admin
      MONGO_DB_NAME: ibermon_db
      SECRET_KEY: ${SECRET_KEY:-ibermon_tfg_dev_secret}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      APP_NAME: Apilbermon
      DEBUG: ${DEBUG:-False}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ibermon_network

volumes:
  mongodb_data:
    driver: local

networks:
  ibermon_network:
    driver: bridge